<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>HDX Links</title>

<style>
body{
    margin:0;
    background:black;
    color:#00ffff;
    font-family:Arial;
    display:flex;
    justify-content:center;
    align-items:center;
    height:100vh;
}

/* BOX */
.container{
    border:2px solid #00ffff;
    width:90%;
    max-width:600px;
    padding:20px;
    box-shadow:0 0 20px #00ffff;
    position:relative;
}

/* LINKS */
.link-box{
    margin:15px 0;
    border-bottom:1px dashed #00ffff;
    padding-bottom:10px;
}

/* BUTTON */
button{
    background:black;
    border:1px solid #00ffff;
    color:#00ffff;
    padding:5px 10px;
    margin-left:10px;
    cursor:pointer;
}

button:hover{
    background:#00ffff;
    color:black;
}

/* ABOUT BUTTON */
.about{
    position:absolute;
    right:10px;
    bottom:10px;
}

/* 🔥 FPS + PING (NICHE FIXED) */
.status{
    margin-top:20px;
    text-align:center;
    font-size:13px;
}

/* TRANSITION */
.transition{
    position:fixed;
    top:0;
    left:0;
    width:100%;
    height:100%;
    background:black;
    transform:scaleX(0);
    transform-origin:left;
    transition:0.4s;
    z-index:9999;
}

.transition.active{
    transform:scaleX(1);
}
</style>
</head>

<body>

<!-- 🔐 PROTECTION -->
<script>
if(localStorage.getItem("hdx_login") !== "true"){
    window.location.href = "index.html";
}
</script>

<div class="transition" id="transition"></div>

<div class="container">

    <!-- LINKS -->
    <div class="link-box">
        <b>1st (Name) Link</b>
        <button onclick="openLink('https://example.com')">Open</button>
        <button onclick="downloadLink('https://example.com/file.zip')">Download</button>
    </div>

    <div class="link-box">
        <b>2nd (Name) Link</b>
        <button onclick="openLink('https://google.com')">Open</button>
        <button onclick="downloadLink('https://example.com/file2.zip')">Download</button>
    </div>

    <!-- 🔥 FPS + PING NICHE -->
    <div class="status">
        FPS: 60 | Ping: <span id="ping">--</span>
    </div>

    <!-- ABOUT -->
    <button class="about" onclick="goAbout()">..ABOUT HDX..</button>

</div>

<script>

// PING
setInterval(()=>{
    document.getElementById("ping").innerText = Math.floor(Math.random()*100)+" ms";
},1000);

// OPEN
function openLink(url){
    window.open(url, "_blank");
}

// DOWNLOAD
function downloadLink(url){
    let a = document.createElement("a");
    a.href = url;
    a.download = "";
    a.click();
}

// ABOUT PAGE
function goAbout(){
    let t = document.getElementById("transition");
    t.classList.add("active");

    setTimeout(()=>{
        window.location.href = "about.html";
    },400);
}
</script>

</body>
</html>
