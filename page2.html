<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>HDX Links</title>

<style>
body{
    margin:0;
    background:black;
    color:#00ffff;
    font-family:Arial;
    display:flex;
    justify-content:center;
    align-items:center;
    height:100vh;
}

/* BOX */
.container{
    border:2px solid #00ffff;
    width:90%;
    max-width:600px;
    padding:20px;
    box-shadow:0 0 20px #00ffff;
    position:relative;
}

/* LINKS */
.link-box{
    margin:15px 0;
    border-bottom:1px dashed #00ffff;
    padding-bottom:10px;
}

/* BUTTON */
button{
    background:black;
    border:1px solid #00ffff;
    color:#00ffff;
    padding:5px 10px;
    margin-left:10px;
    cursor:pointer;
}

button:hover{
    background:#00ffff;
    color:black;
}

/* BACK BUTTON */
.back{
    position:absolute;
    left:10px;
    bottom:10px;
}

/* ABOUT BUTTON */
.about{
    position:absolute;
    right:10px;
    bottom:10px;
}

/* STATUS */
.status{
    margin-top:20px;
    text-align:center;
    font-size:13px;
}

/* TRANSITION */
.transition{
    position:fixed;
    top:0;
    left:0;
    width:100%;
    height:100%;
    background:black;
    transform:scaleX(0);
    transform-origin:left;
    transition:0.4s;
    z-index:9999;
}

.transition.active{
    transform:scaleX(1);
}
</style>
</head>
