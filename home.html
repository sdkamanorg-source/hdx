<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>HDX Home</title>

<link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700&display=swap" rel="stylesheet">

<style>
body{
    margin:0;
    background:black;
    color:#00ffff;
    font-family:'Orbitron', sans-serif;
    display:flex;
    justify-content:center;
    align-items:center;
    height:100vh;
    overflow:hidden;
}

/* PARTICLES */
#particles{
    position:fixed;
    width:100%;
    height:100%;
    z-index:-1;
}

/* BOX */
.container{
    border:2px solid #00ffff;
    padding:20px;
    width:90%;
    max-width:500px;
    text-align:center;
    box-shadow:0 0 25px #00ffff;
    position:relative;
}

/* TOP BAR */
.top{
    display:flex;
    justify-content:space-between;
    font-size:12px;
}

/* BUTTON */
button{
    margin-top:25px;
    padding:12px 25px;
    background:black;
    border:1px solid #00ffff;
    color:#00ffff;
    cursor:pointer;
    transition:0.3s;
}

button:hover{
    background:#00ffff;
    color:black;
    transform:scale(1.1);
}

/* LOGOUT BUTTON */
.logout{
    position:absolute;
    top:10px;
    right:10px;
}

/* TRANSITION */
.transition{
    position:fixed;
    top:0;
    left:0;
    width:100%;
    height:100%;
    background:black;
    transform:scaleX(0);
    transform-origin:left;
    transition:0.4s;
    z-index:9999;
}

.transition.active{
    transform:scaleX(1);
}
</style>
</head>

<body>

<!-- 🔐 PROTECTION FIXED -->
<script>
// ✅ BLOCK DIRECT ACCESS (ONLY CHECK)
if(sessionStorage.getItem("hdx_login") !== "true"){
    window.location.href = "index.html";
}
</script>

<canvas id="particles"></canvas>
<div class="transition" id="transition"></div>

<div class="container">

    <div class="top">
        <div>📡 Ping: <span id="ping">--</span></div>
        <div>⚡ FPS: <span id="fps">0</span>/360</div>
    </div>

    <!-- 🔥 LOGOUT BUTTON -->
    <button class="logout" onclick="logout()">Logout</button>

    <h1>WELCOME TO HDX</h1>

    <button onclick="goNext()">➡ Go Next</button>

</div>

<script>

// 🔓 LOGOUT
function logout(){
    sessionStorage.removeItem("hdx_login");

    let t = document.getElementById("transition");
    t.classList.add("active");

    setTimeout(()=>{
        window.location.href = "index.html";
    },400);
}

// NEXT PAGE
function goNext(){
    let t = document.getElementById("transition");
    t.classList.add("active");

    setTimeout(()=>{
        window.location.href = "page2.html";
    },400);
}

// PING
setInterval(()=>{
    document.getElementById("ping").innerText = Math.floor(Math.random()*80+20)+" ms";
},1000);

// FPS
let lastTime = performance.now();

function updateFPS(){
    let now = performance.now();
    let fps = Math.round(1000 / (now - lastTime));
    lastTime = now;

    if(fps > 360) fps = 360;

    document.getElementById("fps").innerText = fps;

    requestAnimationFrame(updateFPS);
}
updateFPS();

// PARTICLES
const canvas = document.getElementById("particles");
const ctx = canvas.getContext("2d");

canvas.width = window.innerWidth;
canvas.height = window.innerHeight;

let particles = [];

for(let i=0;i<80;i++){
    particles.push({
        x:Math.random()*canvas.width,
        y:Math.random()*canvas.height,
        size:Math.random()*2,
        dx:(Math.random()-0.5),
        dy:(Math.random()-0.5)
    });
}

function animate(){
    ctx.clearRect(0,0,canvas.width,canvas.height);
    ctx.fillStyle="#00ffff";

    particles.forEach(p=>{
        p.x+=p.dx;
        p.y+=p.dy;

        if(p.x<0||p.x>canvas.width) p.dx*=-1;
        if(p.y<0||p.y>canvas.height) p.dy*=-1;

        ctx.beginPath();
        ctx.arc(p.x,p.y,p.size,0,Math.PI*2);
        ctx.fill();
    });

    requestAnimationFrame(animate);
}
animate();

window.addEventListener("resize",()=>{
    canvas.width = window.innerWidth;
    canvas.height = window.innerHeight;
});
</script>

</body>
</html>
