<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>HDX Home</title>

<link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700&display=swap" rel="stylesheet">

<style>
body{
    margin:0;
    background:black;
    color:#00ffff;
    font-family:'Orbitron', sans-serif;
    display:flex;
    justify-content:center;
    align-items:center;
    height:100vh;
    overflow:hidden;
}

/* PARTICLES */
#particles{
    position:fixed;
    width:100%;
    height:100%;
    z-index:-1;
}

/* BOX */
.container{
    border:2px solid #00ffff;
    padding:20px;
    width:90%;
    max-width:500px;
    text-align:center;
    box-shadow:0 0 25px #00ffff;
    position:relative;
}

/* TOP BAR */
.top{
    display:flex;
    justify-content:space-between;
    font-size:12px;
}

/* BUTTON */
button{
    margin-top:25px;
    padding:12px 25px;
    background:black;
    border:1px solid #00ffff;
    color:#00ffff;
    cursor:pointer;
    transition:0.3s;
}

button:hover{
    background:#00ffff;
    color:black;
    transform:scale(1.1);
}

/* LOGOUT BUTTON */
.logout{
    position:absolute;
    top:10px;
    right:10px;
}

/* TRANSITION */
.transition{
    position:fixed;
    top:0;
    left:0;
    width:100%;
    height:100%;
    background:black;
    transform:scaleX(0);
    transform-origin:left;
    transition:0.4s;
    z-index:9999;
}

.transition.active{
    transform:scaleX(1);
}
</style>
</head>
