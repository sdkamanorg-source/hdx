<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>About HDX</title>

<style>
body{
    margin:0;
    background:black;
    color:#00ffff;
    font-family:Arial;
    display:flex;
    justify-content:center;
    align-items:center;
    height:100vh;
}

/* BOX */
.container{
    border:2px solid #00ffff;
    width:90%;
    max-width:500px;
    padding:20px;
    text-align:center;
    box-shadow:0 0 20px #00ffff;
    position:relative;
}

/* TEXT */
h1{
    margin-bottom:10px;
}

p{
    font-size:14px;
    line-height:1.6;
}

/* BUTTON */
button{
    background:black;
    border:1px solid #00ffff;
    color:#00ffff;
    padding:8px 15px;
    cursor:pointer;
}

button:hover{
    background:#00ffff;
    color:black;
}

/* BACK BUTTON */
.back{
    position:absolute;
    left:10px;
    bottom:10px;
}

/* TRANSITION */
.transition{
    position:fixed;
    top:0;
    left:0;
    width:100%;
    height:100%;
    background:black;
    transform:scaleX(0);
    transform-origin:left;
    transition:0.4s;
    z-index:9999;
}

.transition.active{
    transform:scaleX(1);
}
</style>
</head>

<body>

<!-- 🔐 PROTECTION -->
<script>
if(sessionStorage.getItem("hdx_login") !== "true"){
    window.location.href = "index.html";
}
</script>

<div class="transition" id="transition"></div>

<div class="container">

    <h1>ABOUT HDX</h1>

    <p><b>FOUNDER:</b> AMAN</p>
    <p><b>City:</b> Your City</p>
    <p><b>Country:</b> Your Country</p>

    <p>
        HDX is a modern system designed with a hacker-style interface.  
        Built for smooth performance, secure access, and futuristic UI experience.
    </p>

    <!-- BACK -->
    <button class="back" onclick="goBack()">⬅ Back</button>

</div>

<script>

// BACK FUNCTION
function goBack(){
    let t = document.getElementById("transition");
    t.classList.add("active");

    setTimeout(()=>{
        window.location.href = "page2.html";
    },400);
}

</script>

</body>
</html>
